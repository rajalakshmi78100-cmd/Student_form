<!-- component -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
</head>

<body>
    <!--  Application Details Start -->
      <!-- Student Registration Form Template  -->
    <div class="w-full bg-grey-500">
        <div class="container mx-auto py-8">
            <div class="w-96 mx-auto bg-white rounded shadow">

                <div class="mx-16 py-4 px-8 text-black text-xl font-bold border-b border-grey-500">Student Application
                </div>

                <form name="student_application" id="student_application" action="">
                    <div class="py-4 px-8">

                        <div class="mb-4">
                            <label class="block text-grey-darker text-sm font-bold mb-2">Student ID:</label>
                            <input class=" border rounded w-full py-2 px-3 text-grey-darker" type="text"
                                name="student_id" id="student_id" value="" placeholder="Enter Your ID">
                     
                        </div>


                        <div class="mb-4">
                            <label class="block text-grey-darker text-sm font-bold mb-2">Student Name</label>
                            <input class=" border rounded w-full py-2 px-3 text-grey-darker" type="text"
                                name="student_name" id="student_name" value="" placeholder="Enter Your Name">
                      
                        </div>

                        <div class="mb-4">
                            <label class="block text-grey-darker text-sm font-bold mb-2">Course Name:</label>
                            <input class=" border rounded w-full py-2 px-3 text-grey-darker" type="text"
                                name="course_name" id="course_name" value="" placeholder="Enter Your Course Name">
                            <p id=error_creater_id></p>
                        </div>


                             <div class="mb-4">
                            <label class="block text-grey-darker text-sm font-bold mb-2">Addmission Date:</label>
                            <input class=" border rounded w-full py-2 px-3 text-grey-darker" type="datetime-local"
                                name="addmission_date" id="addmission_date" value="">
                            <p id=error_intake_year></p>
                        </div>
                        <div class="mb-4">
                            <button
                                class="mb-2 mx-16 rounded-full py-1 px-24 bg-gradient-to-r from-green-400 to-blue-500 " id="btn">
                                Save
                            </button>
                        </div>
                    </div>
                </form>

            </div>

        </div>
    </div>
    <!--  Application Details End -->


   
                    </div>
                </form>

            </div>

        </div>
    </div>
    <!-- Student Visa End -->
<style>
    #table{
        display: flex;
        justify-content: center;
    }
    #db{
        border:solid 2px black;
         border-collapse: collapse;
        text-align: center;
        padding: 10px;
        width:700px;
    }
     #db td, #db th {
    border: 2px solid black; /* full border around each cell */
    padding: 10px;
  }

</style>
<div id="table">
    <table  id="db">
        <tr>
            <td id="id">Student ID</td>
            <td id="name">Student Name</td>
            <td id="cname">Course Name</td>
            <td id="date">Admission Date</td>
        </tr>
    </table>
</div>
<script>
    var saveData=document.getElementById("btn")
    var tableData=document.getElementById("db")
    saveData.addEventListener("click", function (event) {
    event.preventDefault(); // stop form refresh

    // Get values from form inputs
    const studentId = document.getElementById("student_id").value;
    const studentName = document.getElementById("student_name").value;
    const courseName = document.getElementById("course_name").value;
    const admissionDate = document.getElementById("addmission_date").value;


     // Create a new row
    const newRow = tableData.insertRow(-1);

    // Insert cells
    newRow.insertCell(0).textContent = studentId;
    newRow.insertCell(1).textContent = studentName;
    newRow.insertCell(2).textContent = courseName;
    newRow.insertCell(3).textContent = admissionDate;

// Add a delete button in the last cell
    const deleteCell = newRow.insertCell(4);
    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";
    deleteBtn.style.background = "red";
    deleteBtn.style.color = "white";
    deleteBtn.style.padding = "5px 10px";
    deleteBtn.style.borderRadius = "5px";

    // Delete row on click
    deleteBtn.addEventListener("click", function () {
      if (confirm("Are you sure you want to delete this row?")) {
        tableData.deleteRow(newRow.rowIndex);
      }

    });

    deleteCell.appendChild(deleteBtn);

    // Clear form inputs
    document.getElementById("student_id").value = "";
    document.getElementById("student_name").value = "";
    document.getElementById("course_name").value = "";
    document.getElementById("addmission_date").value = "";
  });
</script>
</body>

</html>
